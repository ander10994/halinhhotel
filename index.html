<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hạ Linh Hotel</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<style>
.hero{
background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
url('https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?auto=format&fit=crop&w=1920');
background-size:cover;
background-position:center;
}
.lightbox,.popup{
position:fixed; inset:0;
display:none; align-items:center; justify-content:center;
background:rgba(0,0,0,.8); z-index:999;
}
.popup-box{
background:white; padding:20px; border-radius:10px; max-width:500px; width:90%;
}
</style>
</head>

<body class="bg-white text-gray-800">

<!-- FLOATING CTA -->
<div class="fixed bottom-4 right-4 flex flex-col gap-3 z-50">
<a href="https://zalo.me/0365203109" class="bg-blue-500 text-white px-4 py-2 rounded-full text-sm">Zalo</a>
<a href="tel:0365203109" class="bg-green-500 text-white px-4 py-2 rounded-full text-sm">Hotline</a>
</div>

<!-- NAV -->
<nav class="fixed w-full bg-white/90 backdrop-blur px-4 py-3 flex justify-between shadow z-50">
<a href="#">Hạ Linh Hotel</a>
<button onclick="toggleLang()" id="langBtn" class="border px-2 py-1 text-xs rounded"></button>
</nav>

<!-- HERO -->
<header class="hero h-[80vh] flex items-center justify-center text-white text-center px-4">
<div>
<h1 class="text-4xl mb-3">Khách sạn gần biển Vũng Tàu</h1>
<p class="mb-4">Phòng đẹp · Giá tốt · Gần biển</p>
<a href="#booking" class="bg-white text-black px-6 py-2 rounded-full">Đặt phòng ngay</a>
</div>
</header>

<!-- TRUST -->
<section class="py-10 text-center bg-gray-100">
<p class="text-lg">⭐ 4.8/5 từ 120+ khách</p>
<p class="text-sm text-gray-500">"Phòng sạch, gần biển, giá hợp lý"</p>
</section>

<!-- ROOMS -->
<section class="py-16 px-4 max-w-6xl mx-auto">
<h2 class="text-xl text-center mb-6">Hạng phòng</h2>

<div class="grid md:grid-cols-3 gap-4">

<div onclick="openRoom('Superior')" class="shadow cursor-pointer">
<img src="https://images.unsplash.com/photo-1631049307264-da0ec9d70304" class="h-48 w-full object-cover">
<div class="p-3">Superior</div>
</div>

<div onclick="openRoom('Deluxe')" class="shadow cursor-pointer">
<img src="https://images.unsplash.com/photo-1618773928121-c32242e63f39" class="h-48 w-full object-cover">
<div class="p-3">Deluxe</div>
</div>

<div onclick="openRoom('Family')" class="shadow cursor-pointer">
<img src="https://images.unsplash.com/photo-1590490360182-c33d57733427" class="h-48 w-full object-cover">
<div class="p-3">Family</div>
</div>

</div>
</section>

<!-- GALLERY -->
<section class="py-16 bg-gray-100">
<h2 class="text-center mb-6">Gallery</h2>

<div class="grid grid-cols-2 md:grid-cols-4 gap-2 max-w-6xl mx-auto px-4">
<img src="https://images.unsplash.com/photo-1566073771259" onclick="openGallery(0)">
<img src="https://images.unsplash.com/photo-1582719478250" onclick="openGallery(1)">
<img src="https://images.unsplash.com/photo-1611892440504" onclick="openGallery(2)">
<img src="https://images.unsplash.com/photo-1590490360182" onclick="openGallery(3)">
</div>
</section>

<!-- BOOKING -->
<section id="booking" class="py-16 bg-gray-50 px-4">
<div class="max-w-xl mx-auto bg-white p-5 shadow rounded">

<h2 class="text-center font-bold mb-4">Đặt phòng ngay!</h2>

<form onsubmit="sendZalo(event)" class="space-y-3">

<input id="name" placeholder="Tên">
<input id="phone" placeholder="SĐT Zalo *">
<input id="checkin">
<input id="checkout">

<select id="room">
<option value="">Chọn hạng phòng *</option>
<option>Superior</option>
<option>Deluxe</option>
<option>Family</option>
</select>

<button class="bg-black text-white w-full py-2">Gửi thông tin</button>

</form>

</div>
</section>

<!-- FOOTER -->
<footer class="bg-black text-white text-center py-8">
<p>Hạ Linh Hotel</p>
<p class="text-sm opacity-60">Vũng Tàu</p>
</footer>

<!-- POPUP -->
<div id="popup" class="popup" onclick="closeRoom()">
<div class="popup-box" onclick="event.stopPropagation()">
<h3 id="roomTitle"></h3>
<p id="roomDesc"></p>
<button onclick="goBooking()" class="bg-black text-white px-4 py-2 mt-3">Đặt ngay</button>
</div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox" class="lightbox" onclick="this.style.display='none'">
<img id="imgView" class="max-w-[90%]">
</div>

<script>

// LANG
let lang='vi';
function toggleLang(){
lang=lang==='vi'?'en':'vi';
document.getElementById('langBtn').innerText=lang==='vi'?'EN':'VI';
}
toggleLang();

// DATE
flatpickr("#checkin",{dateFormat:"d/m/Y"});
flatpickr("#checkout",{dateFormat:"d/m/Y"});

// ZALO
function sendZalo(e){
e.preventDefault();
let phone=document.getElementById('phone').value;
if(!phone){alert("Nhập SĐT");return;}

let msg=`Thông tin khách đặt phòng`;
window.open(`https://zalo.me/0365203109?text=${msg}`);
}

// POPUP
function openRoom(name){
document.getElementById('popup').style.display='flex';
document.getElementById('roomTitle').innerText=name;

let desc={
Superior:"Phòng tiêu chuẩn, giá tốt",
Deluxe:"View đẹp, ban công",
Family:"Phòng rộng cho gia đình"
};
document.getElementById('roomDesc').innerText=desc[name];
}

function closeRoom(){
document.getElementById('popup').style.display='none';
}

function goBooking(){
closeRoom();
document.getElementById('booking').scrollIntoView({behavior:'smooth'});
}

// GALLERY
function openGallery(i){
let imgs=[
"https://images.unsplash.com/photo-1566073771259",
"https://images.unsplash.com/photo-1582719478250",
"https://images.unsplash.com/photo-1611892440504",
"https://images.unsplash.com/photo-1590490360182"
];
document.getElementById('lightbox').style.display='flex';
document.getElementById('imgView').src=imgs[i];
}

</script>

</body>
</html>
