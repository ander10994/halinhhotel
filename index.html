<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hạ Linh Hotel</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<style>
.hero{
background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
url('https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?auto=format&fit=crop&w=1920');
background-size:cover;
background-position:center;
}
.popup{
position:fixed; inset:0;
display:none;
align-items:center;
justify-content:center;
background:rgba(0,0,0,.6);
z-index:999;
}
.popup-box{
background:white;
padding:20px;
border-radius:10px;
max-width:400px;
width:90%;
}
</style>
</head>

<body class="bg-white text-gray-800">

<!-- NAV -->
<nav class="fixed w-full bg-white/90 backdrop-blur px-4 py-3 flex items-center justify-between shadow z-50">
<a href="#" class="flex items-center gap-2">
<img src="/mnt/data/Logo Hotel.png" class="h-8">
<span class="font-bold">Hạ Linh Hotel</span>
</a>
</nav>

<!-- HERO -->
<header class="hero h-[70vh] flex items-center justify-center text-white text-center px-4">
<div>
<h1 class="text-3xl font-semibold mb-3">Khách sạn gần biển Vũng Tàu</h1>
<p class="mb-4">Phòng đẹp · Giá tốt</p>
<a href="#booking" class="bg-white text-black px-5 py-2 rounded-full">Đặt phòng</a>
</div>
</header>

<!-- ROOMS -->
<section class="py-16 px-4 max-w-5xl mx-auto">
<h2 class="text-center mb-6">Hạng phòng</h2>

<div class="grid md:grid-cols-3 gap-4">

<div onclick="openRoom('Superior')" class="shadow cursor-pointer">
<img src="https://images.unsplash.com/photo-1631049307264-da0ec9d70304" class="h-40 w-full object-cover">
<div class="p-2">Superior</div>
</div>

<div onclick="openRoom('Deluxe')" class="shadow cursor-pointer">
<img src="https://images.unsplash.com/photo-1618773928121-c32242e63f39" class="h-40 w-full object-cover">
<div class="p-2">Deluxe</div>
</div>

<div onclick="openRoom('Family')" class="shadow cursor-pointer">
<img src="https://images.unsplash.com/photo-1590490360182-c33d57733427" class="h-40 w-full object-cover">
<div class="p-2">Family</div>
</div>

</div>
</section>

<!-- BOOKING -->
<section id="booking" class="py-16 bg-gray-50 px-4">
<div class="max-w-md mx-auto bg-white p-5 shadow rounded">

<h2 class="text-center font-bold mb-4">Đặt phòng ngay!</h2>

<form onsubmit="sendZalo(event)" class="space-y-3">

<input id="name" placeholder="Tên" class="w-full border p-2">
<input id="phone" placeholder="SĐT Zalo *" class="w-full border p-2">

<div>
<label class="text-xs text-gray-500">Check-in *</label>
<input id="checkin" class="w-full border p-2">
</div>

<div>
<label class="text-xs text-gray-500">Check-out *</label>
<input id="checkout" class="w-full border p-2">
</div>

<select id="room" class="w-full border p-2">
<option value="">Chọn hạng phòng *</option>
<option>Superior</option>
<option>Deluxe</option>
<option>Family</option>
</select>

<button class="bg-black text-white w-full py-2">Gửi thông tin</button>

</form>

</div>
</section>

<!-- POPUP -->
<div id="popup" class="popup" onclick="closeRoom()">
<div class="popup-box" onclick="event.stopPropagation()">
<h3 id="roomTitle"></h3>
<p id="roomDesc"></p>

<button onclick="selectRoom()" class="bg-black text-white w-full py-2 mt-3">
Chọn phòng này
</button>

<button onclick="closeRoom()" class="mt-2 text-sm text-gray-500">
Đóng
</button>

</div>
</div>

<script>

// DATE
let today=new Date();
let tomorrow=new Date();
tomorrow.setDate(today.getDate()+1);

flatpickr("#checkin",{dateFormat:"d/m/Y",defaultDate:today});
flatpickr("#checkout",{dateFormat:"d/m/Y",defaultDate:tomorrow});

// ROOM DATA
let selectedRoom = "";

function openRoom(name){
selectedRoom = name;

document.getElementById('popup').style.display='flex';
document.getElementById('roomTitle').innerText=name;

let desc={
Superior:"Phòng giá tốt",
Deluxe:"View đẹp, ban công",
Family:"Phòng rộng"
};

document.getElementById('roomDesc').innerText=desc[name];
}

function closeRoom(){
document.getElementById('popup').style.display='none';
}

// AUTO SELECT ROOM
function selectRoom(){
closeRoom();

let roomSelect = document.getElementById('room');
roomSelect.value = selectedRoom;

// scroll
document.getElementById('booking').scrollIntoView({behavior:'smooth'});

// focus phone
setTimeout(()=>{
document.getElementById('phone').focus();
},500);
}

// ZALO
function sendZalo(e){
e.preventDefault();

let name=document.getElementById('name').value||"";
let phone=document.getElementById('phone').value;
let checkin=document.getElementById('checkin').value;
let checkout=document.getElementById('checkout').value;
let room=document.getElementById('room').value;

if(!phone){
alert("Vui lòng điền số điện thoại");
return;
}

let msg=
`Thông tin khách đặt phòng:%0A%0A
Tên: ${name}%0A
SĐT Zalo: ${phone}%0A
Check-in: ${checkin}%0A
Check-out: ${checkout}%0A
Hạng phòng: ${room}`;

window.open(`https://zalo.me/0365203109?text=${msg}`);
}

</script>

</body>
</html>
